services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_USERNAME: user123
      POSTGRESQL_PASSWORD: user123
      POSTGRESQL_DATABASE: helpdesk
    volumes:
      - database:/bitnami/postgresql
  helpdesk-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: helpdesk-api
    container_name: helpdesk-api
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgres://user123:user123@postgres:5432/helpdesk?schema=public
      JWT_SECRET: b843219e05c651e76329963c2b9e1343
      PORT: 3333
    depends_on:
      - postgres

volumes:
  database:
